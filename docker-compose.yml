version: '3.8'

services:
  db:
    build: .
    container_name: innovatech_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-innovatech_ops}
      MYSQL_USER: ${MYSQL_USER:-innovatech_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-innovatech_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    labels:
      - "com.innovatech.service=database"

volumes:
  mysql_data:
    driver: local
